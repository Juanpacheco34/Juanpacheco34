<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 13</title>
    <link rel="stylesheet" href="Ejercicio_13.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    </head>

<body>
    <section class="container">
        <form action="" method="get" name="Formulario" class=" border border-4 border-danger w-75 p-3 mt-5 m-auto">
            <fieldset class="">
                <legend>Formulario Registro</legend>
                <div class="mb-3 row">
                    <label for="email" class="form-label mb-3">Email:</label>
                    <input class="form-control" type="email" id="email" name="email" placeholder="Ingrese su Email">
                </div>
                <div class="mb-3 row">
                    <label for="contrasena" class="form-label mb-3">Contraseña:</label>
                    <input class="form-control" type="password" id="contrasena" name="contrasena" placeholder="Ingrese su Contraseña">
                </div>
                <div class="form-check mb-4">
                    <input class="form-check-input" type="radio" name="recuerdame" id="recuerdame">
                    <label for="recuerdame" class="form-check-label">Recuerdame</label>
                </div>
                <div>
                    <input type="submit" value="Registrar" class="btn btn-outline-secondary">
                </div>
            </fieldset>
        </form>
    </section>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>

</html>
