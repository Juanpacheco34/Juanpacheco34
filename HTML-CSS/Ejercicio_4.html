<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 4</title>
</head>

<body style="margin-left: 100px;">
  <header>
    <h1>Papas Fritas</h1>
  </header>
  <section>
    <span>Receta de papas fritas caseras</span>
    <figure style="margin: 0px">
      <img width="300px" height="200px" src="img/papas.jpg" alt="papas fritas">
      <figcaption>Papas Fritas Caseras</figcaption>
    </figure>
    <h3>Ingredientes</h3>
    <ul>
      <li>3 o 4 papas (300gr)</li>
      <li>Aceite</li>
      <li>Sal</li>
    </ul>
    <h3>Elaboracion (pasos)</h3>
    <ol>
      <li>Pelar las papas</li>
      <li>Cortalas en baston</li>
      <li>Calentar aceite en una sarten</li>
      <li>Cocinar hasta que esten doradas</li>
      <li>Removerlas del aceite</li>
    </ol>
  </section>
  <hr style="border: 1px dashed rgb(219, 202, 202);">

</body>

</html>
