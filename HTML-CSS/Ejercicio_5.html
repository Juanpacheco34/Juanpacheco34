<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 5</title>
</head>
<body style="background-color: antiquewhite; margin: 0px 500px ;">
    <header>
        <h1>The Beatles</h1>
    </header>
    <section>
        <span>Es una banda de rock formada en el año 1960 en Liverpool</span>
        <div style="margin: 6px;"></div>
        <figure style="margin:0;">
            <img width="500px" height="200" src="img/beatles.png" alt="Los Beatles en un paso peatonal">
            <figcaption>Los Beatles</figcaption>
        </figure>
        <h3>Integrantes:</h3>
        <ul>
            <li>Paul McCartney</li>
            <li>Jhon Lennon</li>
            <li>Ringo Star</li>
            <li>George Harrinson</li>
        </ul>
        <table border="1px">
            <thead >
                <tr >
                    <th>Año</th>
                    <th>Disco</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1965</td>
                    <td>Help!</td>
                </tr>
                <tr>
                    <td>1968</td>
                    <td>The Batles</td>
                </tr>
                <tr>
                    <td>1969</td>
                    <td>Abbey Road</td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="2">"Abbey Road fue su ultimo disco"</td>
                </tr>
            </tfoot>
        </table>
    </section>
